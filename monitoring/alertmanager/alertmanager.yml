global:
  resolve_timeout: 5m
  smtp_from: 'alerts@llm-observability.local'
  smtp_smarthost: 'localhost:587'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'category', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    # Critical alerts page immediately
    - match:
        severity: critical
      receiver: 'critical-pager'
      group_wait: 10s
      repeat_interval: 1h

    # Hallucination alerts to ML team
    - match:
        category: hallucination
      receiver: 'ml-team'
      group_wait: 1m
      repeat_interval: 2h

    # Cost alerts to finance + engineering
    - match:
        category: cost
      receiver: 'cost-alerts'
      repeat_interval: 2h

    # Latency alerts to SRE
    - match:
        category: latency
      receiver: 'sre-team'
      repeat_interval: 30m

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://backend:8000/alerts/webhook'
        send_resolved: true

  - name: 'critical-pager'
    webhook_configs:
      - url: 'http://backend:8000/alerts/webhook'
        send_resolved: true
        http_config:
          basic_auth:
            username: 'alertmanager'
            password: 'secret'
    # Add PagerDuty, OpsGenie, or Slack here:
    # pagerduty_configs:
    #   - routing_key: '<PAGERDUTY_KEY>'
    # slack_configs:
    #   - api_url: '<SLACK_WEBHOOK_URL>'
    #     channel: '#incidents'
    #     title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'

  - name: 'ml-team'
    webhook_configs:
      - url: 'http://backend:8000/alerts/webhook'
        send_resolved: true
    # slack_configs:
    #   - api_url: '<SLACK_WEBHOOK>'
    #     channel: '#ml-alerts'

  - name: 'cost-alerts'
    webhook_configs:
      - url: 'http://backend:8000/alerts/webhook'
        send_resolved: true

  - name: 'sre-team'
    webhook_configs:
      - url: 'http://backend:8000/alerts/webhook'
        send_resolved: true

inhibit_rules:
  # Suppress warnings when critical is already firing for same rule category
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['category']
