groups:
  - name: llm_latency
    rules:
      - alert: HighP50Latency
        expr: avg(p95_latency{operation="middleware_latency"}) > 1000
        for: 2m
        labels:
          severity: warning
          category: latency
        annotations:
          summary: "P50 latency above 1000ms"
          description: "Median latency is {{ $value }}ms. Runbook: /runbooks/latency_p50_warning"

      - alert: HighP95Latency
        expr: avg(p95_latency{operation="middleware_latency"}) > 3000
        for: 1m
        labels:
          severity: warning
          category: latency
        annotations:
          summary: "P95 latency above 3000ms"
          description: "P95 latency is {{ $value }}ms. Runbook: /runbooks/latency_p95_warning"

      - alert: CriticalP99Latency
        expr: avg(p95_latency{operation="middleware_latency"}) > 6000
        for: 30s
        labels:
          severity: critical
          category: latency
        annotations:
          summary: "CRITICAL: P99 latency above 6000ms"
          description: "P99 latency is {{ $value }}ms — service severely degraded. Runbook: /runbooks/latency_p99_critical"

  - name: llm_errors
    rules:
      - alert: ElevatedErrorRate
        expr: llm_error_rate{endpoint="/chat"} > 0.05
        for: 2m
        labels:
          severity: warning
          category: errors
        annotations:
          summary: "Error rate above 5% on /chat"
          description: "Error rate is {{ $value | humanizePercentage }}. Runbook: /runbooks/error_rate_warning"

      - alert: CriticalErrorRate
        expr: llm_error_rate{endpoint="/chat"} > 0.20
        for: 1m
        labels:
          severity: critical
          category: errors
        annotations:
          summary: "CRITICAL: Error rate above 20%"
          description: "Error rate is {{ $value | humanizePercentage }} — major outage. Runbook: /runbooks/error_rate_critical"

  - name: llm_cost
    rules:
      - alert: HighHourlyCost
        expr: increase(total_cost_usd_sum[1h]) > 1.0
        for: 5m
        labels:
          severity: warning
          category: cost
        annotations:
          summary: "Hourly LLM cost exceeded $1.00"
          description: "Current hourly spend: ${{ $value }}. Runbook: /runbooks/cost_hourly_warning"

      - alert: CriticalHourlyCost
        expr: increase(total_cost_usd_sum[1h]) > 5.0
        for: 2m
        labels:
          severity: critical
          category: cost
        annotations:
          summary: "CRITICAL: Hourly cost exceeded $5.00"
          description: "Projected daily spend: ${{ $value | humanize }}. Runbook: /runbooks/cost_hourly_critical"

  - name: llm_hallucination
    rules:
      - alert: ElevatedHallucinationRate
        expr: llm_hallucination_rate > 0.10
        for: 5m
        labels:
          severity: warning
          category: hallucination
        annotations:
          summary: "Hallucination rate above 10%"
          description: "Rate: {{ $value | humanizePercentage }}. Runbook: /runbooks/hallucination_rate_warning"

      - alert: CriticalHallucinationRate
        expr: llm_hallucination_rate > 0.30
        for: 2m
        labels:
          severity: critical
          category: hallucination
        annotations:
          summary: "CRITICAL: Hallucination rate above 30%"
          description: "Rate: {{ $value | humanizePercentage }} — response quality severely degraded. Runbook: /runbooks/hallucination_rate_critical"
